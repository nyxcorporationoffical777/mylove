<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceva se pregătește...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
    width: 100%;
    height: 100%;
  }

  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 560px;
  }

  .lock {
    font-size: 56px;
    display: block;
    margin-bottom: 28px;
    animation: float 3.5s ease-in-out infinite;
    opacity: 0.9;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(-3deg); }
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 4px;
    color: #f9c5d1;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 18px;
  }

  .title {
    font-size: clamp(26px, 6vw, 42px);
    font-weight: normal;
    color: #f9c5d1;
    letter-spacing: 1px;
    line-height: 1.4;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1.3s ease forwards 0.3s;
  }

  .sub {
    font-size: clamp(14px, 2.4vw, 17px);
    color: #c9a0aa;
    line-height: 1.9;
    margin-bottom: 48px;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1.3s ease forwards 0.9s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1.3s ease forwards 1.4s;
  }

  .unit {
    background: rgba(249,197,209,0.05);
    border: 1px solid rgba(249,197,209,0.2);
    border-radius: 16px;
    padding: 18px 14px;
    min-width: 68px;
  }

  .unit-num {
    font-size: clamp(24px, 5vw, 34px);
    color: #fff;
    font-weight: normal;
    display: block;
    font-family: Georgia, serif;
  }

  .unit-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #c9a0aa;
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
  }

  .hint {
    font-size: 13px;
    color: #a18a91;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 1.3s ease forwards 1.9s;
    line-height: 1.8;
  }

  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f9c5d1, transparent);
    margin: 32px auto;
    opacity: 0;
    animation: fadeUp 1.3s ease forwards 1.7s;
  }

  .ready-msg {
    display: none;
    font-size: clamp(22px, 5vw, 32px);
    color: #f9c5d1;
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .heart-pulse {
    font-size: 56px;
    display: none;
    animation: pulse 1.6s ease-in-out infinite;
    margin-bottom: 24px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }

  @media (max-width: 420px) {
    .unit { min-width: 56px; padding: 14px 10px; }
    .countdown { gap: 10px; }
  }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="wrap" id="waiting-view">
  <span class="lock">🔒</span>
  <p class="eyebrow">Ceva se pregătește</p>
  <h1 class="title">Nu e timpul încă.<br>Dar va veni.</h1>
  <p class="sub">Există un motiv pentru care îți arăt asta acum<br>și nu tot ce am pregătit pentru tine.</p>

  <div class="countdown" id="countdown">
    <div class="unit"><span class="unit-num" id="cd-h">00</span><span class="unit-label">ore</span></div>
    <div class="unit"><span class="unit-num" id="cd-m">00</span><span class="unit-label">min</span></div>
    <div class="unit"><span class="unit-num" id="cd-s">00</span><span class="unit-label">sec</span></div>
  </div>

  <div class="divider"></div>

  <p class="hint">Diseară totul se va lumina.<br>Pregătește-te — nu e doar o seară obișnuită.</p>
</div>

<div class="wrap" id="ready-view" style="display:none;">
  <span class="heart-pulse" style="display:block;">❤️</span>
  <p class="ready-msg">A venit timpul.<br>Sunt aici.<br>Vino la mine.</p>
</div>

<script>
/* ── PARTICLES ── */
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let W, H;
const particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.6 + 0.3,
    speed: Math.random() * 0.25 + 0.08,
    alpha: Math.random() * 0.5 + 0.2,
    flicker: Math.random() * Math.PI * 2
  });
}

(function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.flicker += 0.018;
    const a = p.alpha * (0.7 + 0.3 * Math.sin(p.flicker));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(249,197,209,${a})`;
    ctx.fill();
    p.y -= p.speed;
    if (p.y < -2) { p.y = H + 2; p.x = Math.random() * W; }
  });
  requestAnimationFrame(drawParticles);
})();

/* ── COUNTDOWN to 22:00 today ── */
function getTarget() {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0);
  if (now > target) target.setDate(target.getDate());
  return target;
}

const target = getTarget();
const waitingView = document.getElementById('waiting-view');
const readyView = document.getElementById('ready-view');

function tick() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    waitingView.style.display = 'none';
    readyView.style.display = 'block';
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(s).padStart(2, '0');

  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
